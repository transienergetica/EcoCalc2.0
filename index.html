<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoCalc • Seu Impacto no Planeta</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="folhas"></div>

<section class="inicio">

<div class="logo">

🌍

<h1>EcoCalc</h1>

<p>Descubra seu impacto ambiental</p>

</div>

<button id="btnComecar">

Começar

</button>

</section>

<section class="quiz">

<div class="progresso">

<div id="barra"></div>

</div>

<h2 id="tituloPergunta"></h2>

<div id="pergunta"></div>

<div class="botoes">

<button id="anterior">

⬅ Voltar

</button>

<button id="proximo">

Próxima ➜

</button>

</div>

</section>

<section class="loading">

<div class="planeta">

🌎

</div>

<h2>Calculando...</h2>

<p>Analisando seus hábitos sustentáveis</p>

</section>

<section class="resultado">

<h1>

🌿 Resultado

</h1>

<h2 id="pontuacao"></h2>

<div class="velocimetro">

<div id="ponteiro"></div>

</div>

<h3 id="nivel"></h3>

<canvas id="grafico"></canvas>

<div id="arvores"></div>

<div id="missoes"></div>

<button id="refazer">

Calcular novamente

</button>

EcoCalc © 2026

</footer>

<button id="baixarImagem">
📷 Baixar Resultado
</button>

<div id="fraseEco"></div>

<script src="script.js"></script>

</body>
</html>
